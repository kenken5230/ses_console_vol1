name: ai-safety-gate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  ai-safety-gate:
    name: ai-safety-gate
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run safety gate
        shell: pwsh
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          $baseRef = "origin/${{ github.base_ref }}"
          $sessionStartRef = git merge-base HEAD $baseRef
          if (-not $sessionStartRef) {
            Write-Error "Failed to calculate merge-base for $baseRef..HEAD"
            exit 1
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\safety-gate.ps1 -SessionStartRef $sessionStartRef

  typecheck:
    name: typecheck
    runs-on: windows-latest
    env:
      DATABASE_URL: postgresql://ci-user:ci-pass@localhost:5432/ses_console_ci
      AUTH_SECRET: ci-only-auth-secret-at-least-32-characters
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

  test:
    name: test
    runs-on: windows-latest
    env:
      DATABASE_URL: postgresql://ci-user:ci-pass@localhost:5432/ses_console_ci
      AUTH_SECRET: ci-only-auth-secret-at-least-32-characters
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Test
        run: npm test

  build:
    name: build
    runs-on: windows-latest
    env:
      DATABASE_URL: postgresql://ci-user:ci-pass@localhost:5432/ses_console_ci
      AUTH_SECRET: ci-only-auth-secret-at-least-32-characters
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build
